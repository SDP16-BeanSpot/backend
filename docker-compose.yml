#      - elasticsearch
#    networks:
#      - es_network

#  flyway:
#    image: flyway/flyway:9
#    depends_on:
#      mysql:
#        condition: service_healthy
#    command: >
#      -url=jdbc:mysql://mysql:3306/beanspot?allowPublicKeyRetrieval=true&useSSL=false
#      -user=app
#      -password=app1234
#      migrate
#    volumes:
#      - ./src/main/resources/db/migration:/flyway/sql

  app:
    #build:
    #  context: .
    #  dockerfile: docker/app/Dockerfile
    image: 258143933136.dkr.ecr.ap-northeast-2.amazonaws.com/beanspot-app:latest
    container_name: beanspot-app
    env_file:
      - .env
    restart: always
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      retries: 3
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started

networks:
  es_network:
    driver: bridge

volumes:
  mysql-data:
  es-data: